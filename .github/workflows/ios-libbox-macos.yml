name: ios-libbox-macos

on:
  workflow_dispatch:
    inputs:
      sing_box_ref:
        description: Optional sing-box ref/tag/sha when the source tree is not committed in this repo
        required: false
        default: ""
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-libbox-and-validate-ios:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      SING_BOX_REF: ${{ github.event.inputs.sing_box_ref || '' }}
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show runner info
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          uname -a
          echo "Runner: $RUNNER_OS / $RUNNER_ARCH"
          ls -1 /Applications | sed -n '1,120p'

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            latest="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "$latest" ]; then
              echo "No Xcode installation found on the runner" >&2
              exit 1
            fi
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Install gomobile
        shell: bash
        run: |
          set -euo pipefail
          go version
          go env
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260312152759-81488f6aeb60
          export PATH="$(go env GOPATH)/bin:$PATH"
          gomobile version || true
          gomobile init

      - name: Resolve sing-box source tree
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE/sing-box-testing/cmd/internal/build_libbox" ]; then
            echo "SING_BOX_SOURCE_DIR=$GITHUB_WORKSPACE/sing-box-testing" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -d "$GITHUB_WORKSPACE/sing-box-testing/sing-box-testing/cmd/internal/build_libbox" ]; then
            echo "SING_BOX_SOURCE_DIR=$GITHUB_WORKSPACE/sing-box-testing/sing-box-testing" >> "$GITHUB_ENV"
            exit 0
          fi

          git clone --depth 1 https://github.com/SagerNet/sing-box.git "$RUNNER_TEMP/sing-box-testing"
          if [ -n "${SING_BOX_REF:-}" ]; then
            git -C "$RUNNER_TEMP/sing-box-testing" fetch --depth 1 origin "${SING_BOX_REF}"
            git -C "$RUNNER_TEMP/sing-box-testing" checkout FETCH_HEAD
          fi
          echo "SING_BOX_SOURCE_DIR=$RUNNER_TEMP/sing-box-testing" >> "$GITHUB_ENV"
          git -C "$RUNNER_TEMP/sing-box-testing" rev-parse HEAD

      - name: Build Libbox.xcframework
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          chmod +x ./tools/build_libbox_apple_from_uploaded_sources.sh
          ./tools/build_libbox_apple_from_uploaded_sources.sh
          test -d ios/Frameworks/Libbox.xcframework
          find ios/Frameworks/Libbox.xcframework -maxdepth 2 | sed -n '1,200p'

      - name: Detect Xcode project
        id: detect_project
        shell: bash
        run: |
          set -euo pipefail
          has_project=false
          if [ -d ios/Runner.xcworkspace ] || [ -d ios/Runner.xcodeproj ]; then
            has_project=true
          fi
          echo "has_project=$has_project" >> "$GITHUB_OUTPUT"

      - name: Install Flutter when an iOS host project exists
        if: steps.detect_project.outputs.has_project == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/flutter/bin:$PATH"
          flutter --version
          flutter doctor -v || true
          flutter pub get

      - name: Install CocoaPods dependencies when Podfile exists
        if: steps.detect_project.outputs.has_project == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$RUNNER_TEMP/flutter/bin:$PATH"
          if [ -f ios/Podfile ]; then
            cd ios
            pod install --repo-update
          fi

      - name: Validate iOS build without codesign
        if: steps.detect_project.outputs.has_project == 'true'
        shell: bash
        run: |
          set -euo pipefail
          workspace_args=()
          if [ -d ios/Runner.xcworkspace ]; then
            workspace_args=(-workspace ios/Runner.xcworkspace)
          elif [ -d ios/Runner.xcodeproj ]; then
            workspace_args=(-project ios/Runner.xcodeproj)
          else
            echo "No Xcode project found" >&2
            exit 1
          fi

          xcodebuild \
            "${workspace_args[@]}" \
            -scheme Runner \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Explain skipped app build
        if: steps.detect_project.outputs.has_project != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipped xcodebuild because this repo does not currently include ios/Runner.xcodeproj or ios/Runner.xcworkspace."
          echo "The workflow still built ios/Frameworks/Libbox.xcframework and uploaded it as an artifact."

      - name: Upload Libbox artifact
        uses: actions/upload-artifact@v6
        with:
          name: Libbox.xcframework-macos
          path: ios/Frameworks/Libbox.xcframework
          if-no-files-found: error
          retention-days: 14
